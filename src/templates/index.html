<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoTextLM | AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --panel-bg: #334155;
            --user-msg-bg: #3b82f6;
            --bot-msg-bg: #475569;
            --text-color: #f8fafc;
            --input-bg: #334155;
            --accent: #60a5fa;
            --slider-track: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-wrapper {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            gap: 20px;
        }

        .settings-panel {
            width: 300px;
            background-color: var(--chat-bg);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .container {
            flex-grow: 1;
            background-color: var(--chat-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-box::-webkit-scrollbar { width: 8px; }
        .chat-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px;
            background-color: rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: var(--input-bg);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button {
            padding: 0 25px;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #475569; cursor: not-allowed; }

        /* Sliders */
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .setting-group label {
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
        }

        .val-display {
            font-family: monospace;
            color: var(--accent);
        }

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="settings-panel">
        <h2 style="margin-top: 0; font-size: 1.2rem;">Parameters</h2>
        
        <div class="setting-group">
            <label>Temperature <span id="temp-val" class="val-display">0.8</span></label>
            <input type="range" id="temp" min="0.1" max="2.0" step="0.1" value="0.8">
        </div>

        <div class="setting-group">
            <label>Top P <span id="topp-val" class="val-display">0.9</span></label>
            <input type="range" id="topp" min="0.1" max="1.0" step="0.05" value="0.9">
        </div>

        <div class="setting-group">
            <label>Max Tokens <span id="tokens-val" class="val-display">200</span></label>
            <input type="range" id="tokens" min="50" max="500" step="10" value="200">
        </div>

        <div style="margin-top: auto; font-size: 0.8rem; color: #94a3b8;">
            NanoTextLM v1.0<br>
            Powered by PyTorch
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>NanoTextLM</h1>
        </div>
        
        <div id="chat-box" class="chat-box">
            <div class="message bot-msg">Hello! I'm NanoTextLM. How can I help you today?</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    
    // Settings
    const tempInput = document.getElementById('temp');
    const toppInput = document.getElementById('topp');
    const tokensInput = document.getElementById('tokens');
    
    // Update displays
    tempInput.oninput = () => document.getElementById('temp-val').innerText = tempInput.value;
    toppInput.oninput = () => document.getElementById('topp-val').innerText = toppInput.value;
    tokensInput.oninput = () => document.getElementById('tokens-val').innerText = tokensInput.value;

    // Event Listeners
    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    sendBtn.addEventListener('click', sendMessage);

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Add User Message
        appendMessage("You", text, "user-msg");
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        // Create Bot Message Container (Empty initially)
        const botMsgDiv = document.createElement('div');
        botMsgDiv.className = 'message bot-msg';
        chatBox.appendChild(botMsgDiv);
        scrollToBottom();

        try {
            const response = await fetch('/api/generate_stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: text,
                    temperature: parseFloat(tempInput.value),
                    top_p: parseFloat(toppInput.value),
                    max_tokens: parseInt(tokensInput.value)
                })
            });

            if (!response.ok) throw new Error("Network error");

            // Setup Stream Reader
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let botText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                botText += chunk;
                botMsgDiv.innerText = botText; // Update text in real-time
                scrollToBottom();
            }

        } catch (error) {
            botMsgDiv.innerText = "Error: Could not reach the model.";
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function appendMessage(sender, text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        chatBox.appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
